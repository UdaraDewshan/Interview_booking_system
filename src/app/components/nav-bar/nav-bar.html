<div class="sticky top-4 z-50 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-8">
  
  <nav class="bg-white/80 backdrop-blur-lg border border-slate-200/80 shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl h-16 px-4 sm:px-5 flex justify-between items-center transition-all duration-300">

    <div class="flex items-center gap-8 lg:gap-12">

      <div class="flex items-center gap-3 cursor-pointer group">
  
        <span class="font-bold text-xl tracking-tight text-slate-800 group-hover:text-indigo-600 transition-colors hidden sm:block">
          Exam<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-500">Hub</span>
        </span>
      </div>

      <div class="hidden md:flex items-center p-1 bg-slate-50/80 border border-slate-100 rounded-xl gap-1">
        
        <a routerLink="/dashboard" 
           routerLinkActive="!bg-white !text-indigo-700 !shadow-sm !border-slate-200/60" 
           [routerLinkActiveOptions]="{exact: true}"
           class="px-4 py-1.5 rounded-lg text-slate-500 font-bold hover:text-slate-800 text-sm transition-all border border-transparent">
          Dashboard
        </a>
        
        <a routerLink="/candidates" 
           routerLinkActive="!bg-white !text-indigo-700 !shadow-sm !border-slate-200/60"
           class="px-4 py-1.5 rounded-lg text-slate-500 font-bold hover:text-slate-800 text-sm transition-all border border-transparent">
          Candidates
        </a>
        
        <a routerLink="/interviewers" 
           routerLinkActive="!bg-white !text-indigo-700 !shadow-sm !border-slate-200/60"
           class="px-4 py-1.5 rounded-lg text-slate-500 font-bold hover:text-slate-800 text-sm transition-all border border-transparent">
          Interviewers
        </a>
        
        <a routerLink="/booked" 
           routerLinkActive="!bg-white !text-indigo-700 !shadow-sm !border-slate-200/60"
           class="px-4 py-1.5 rounded-lg text-slate-500 font-bold hover:text-slate-800 text-sm transition-all border border-transparent">
          History
        </a>

      </div>

    </div>

    <div class="flex items-center gap-3">

      <button class="relative p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50/80 rounded-full transition-all group">
        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white group-hover:border-indigo-50 transition-colors"></span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
      </button>

      <div class="h-6 w-px bg-slate-200/80 mx-1"></div>

      <div class="flex items-center gap-2.5 cursor-pointer p-1 pr-3 rounded-full hover:bg-slate-50/80 border border-transparent hover:border-slate-200/60 transition-all">
        <img class="w-8 h-8 rounded-full border border-slate-200 shadow-sm object-cover" src="https://ui-avatars.com/api/?name=Udara+Dewshan&background=4F46E5&color=fff" alt="Udara Dewshan">
        <div class="text-left hidden sm:block mt-0.5">
          <p class="text-xs font-bold text-slate-800 leading-none mb-1">Udara Dewshan</p>
          <p class="text-[9px] text-indigo-500 font-black uppercase tracking-widest leading-none">Admin</p>
        </div>
        <svg class="w-4 h-4 text-slate-400 ml-1 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>

    </div>

  </nav>
</div>
