<main class="min-h-screen bg-slate-50 flex flex-col justify-center relative overflow-hidden selection:bg-indigo-500 selection:text-white">
  
  <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob"></div>
  <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-2000"></div>
  <div class="absolute -bottom-8 left-20 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-4000"></div>

  <div class="relative w-full max-w-md mx-auto px-6 z-10">
    
    <div class="flex flex-col items-center mb-10">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 flex items-center justify-center text-white font-black text-2xl shadow-xl shadow-indigo-500/20 mb-5">
        IS
      </div>
      <h2 class="text-3xl font-black text-slate-900 tracking-tight text-center">
        Welcome back
      </h2>
      <p class="text-sm font-semibold text-slate-500 mt-2 text-center">
        Sign in to Interview<span class="text-indigo-600">Sync</span> to continue.
      </p>
    </div>

    <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-8 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/60">
      
      <form class="space-y-6">
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Work Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
            </div>
            <input type="email" placeholder="admin@interviewsync.com" 
                   class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 rounded-2xl border border-slate-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 font-medium text-slate-900 transition-all placeholder:text-slate-400">
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2 ml-1 mr-1">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Password</label>
            <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Forgot?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <input type="password" placeholder="••••••••" 
                   class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 rounded-2xl border border-slate-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 font-medium text-slate-900 transition-all placeholder:text-slate-400 tracking-widest">
          </div>
        </div>

        <button type="button" routerLink="/dashboard" 
                class="w-full mt-2 py-4 rounded-2xl text-sm font-bold bg-slate-900 text-white hover:bg-indigo-600 transition-all duration-300 shadow-[0_4px_14px_0_rgba(15,23,42,0.2)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] flex items-center justify-center gap-2 group">
          Sign In to Workspace
          <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>

      </form>

    </div>
    
    <p class="text-center text-xs font-semibold text-slate-400 mt-8">
      Protected by InterviewSync Security.
    </p>

  </div>
</main>
